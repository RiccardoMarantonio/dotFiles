set-environment -g SCRIPTS "$HOME/dev/scripts"
unbind-key -a
unbind r
bind-key r source-file ~/.config/tmux/tmux.conf
set -g prefix C-s
set -g mouse on
bind-key : command-prompt

# ########## VISUALS ##########

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256color:Tc"
set -g base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
set -g focus-events on

# ########## RESIZE PANES ##########

bind-key -r Left resize-pane -L 5   # Prefix + Left Arrow (repeatable)
bind-key -r Down resize-pane -D 5   # Prefix + Down Arrow (repeatable)
bind-key -r Up resize-pane -U 5     # Prefix + Up Arrow (repeatable)
bind-key -r Right resize-pane -R 5  # Prefix + Right Arrow (repeatable)

# ########## MOVE PANES ##########
bind-key H swap-pane -d -t '{left-of}'   # Move pane left
bind-key J swap-pane -d -t '{down-of}'   # Move pane down
bind-key K swap-pane -d -t '{up-of}'     # Move pane up
bind-key L swap-pane -d -t '{right-of}'  # Move pane right

# Resize panes using Prefix + Arrow Keys (holding prefix not required if you use -r for repeatable)
bind-key -r Left resize-pane -L 5
bind-key -r Down resize-pane -D 5
bind-key -r Up resize-pane -U 5
bind-key -r Right resize-pane -R 5

# ########## COPY MODE ##########

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ########## POP-UPS ##########

bind-key g display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "lazygit"
bind-key G display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "git difftool -d"
bind-key z display-popup -d "#{pane_current_path}" -w 60% -h 60% -E "fish"
bind-key o split-window -h -c "#{pane_current_path}" "opencode $(tmux display-message -p '#{session_path}')"

# ########## NAVIGATION ##########

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key w kill-pane
bind-key W kill-window
bind-key q detach-client
bind-key d split-window -h -c "#{pane_current_path}" 
bind-key D split-window -v -c "#{pane_current_path}" 
bind-key a copy-mode
bind-key [ previous-window
bind-key ] next-window
bind-key c new-window -c "#{pane_current_path}" 

bind-key p switch-client -l

# ########## SESSION MANAGEMENT ##########

bind-key f display-popup -E -w 60% -h 30% "$SCRIPTS/tmux/tmux-sessionizer.sh"
bind-key n run-shell "tmux new-session -A -d -s \"$(basename #{pane_current_path})\" -c #{pane_current_path} && tmux switch-client -t \"$(basename #{pane_current_path})\""
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore "off"        # auto-restore on start
set -g @continuum-save-interval "5"   # min

# ########## STATUS BAR ##########

nordBackground=#3b4252
nordBlue=#80A1C1
nordFG=#CDCECF

set-option -g status-position top
set -g status 2
set -g status-format[1] "#{repeat_space 999}"  # Big enough to fill any width

set -g status-left-length 100
set -g status-style "bg=default"
set -g status-right ""
set -g status-left " #{?client_prefix,#[fg=black]#[bg=${nordBlue}] ,#[fg=black]#[bg=${nordBlue}] } #[bg=${nordBlue}]#[fg=#2e3440,bold]#S "
set -g window-status-format "#[bg=default]#[fg=#808080]  #I #W  "
set -g window-status-current-format "#[bg=${nordBackground}]#[fg=#27FF1E,bold] #[bg=${nordBackground}]#[fg=${nordFG},bold] #I #W  "
set -g window-status-separator ""

# ########## FUZZ BACK ##########

set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind /
set -g @fuzzback-popup 1

set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

