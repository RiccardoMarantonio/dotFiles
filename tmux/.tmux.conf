set-environment -g SCRIPTS "$HOME/.local/scripts"
unbind-key -a
unbind r
bind-key r source-file ~/.tmux.conf
set -g prefix C-s
set -g mouse on

# ########## VISUALS ##########

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
set -g renumber-windows on
setw -g aggressive-resize on

# ########## COPY MODE ##########

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ########## POP-UPS ##########

bind-key -n C-g display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "lazygit"
bind-key z display-popup -d "#{pane_current_path}" -w 60% -h 60% -E "zsh"
bind-key o split-window -h -c "#{pane_current_path}" "opencode $(tmux display-message -p '#{session_path}')"

# ########## NAVIGATION ##########

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key w kill-pane
bind-key W kill-window
bind-key q detach-client
bind-key d split-window -h
bind-key D split-window -v
bind-key a copy-mode
bind-key [ previous-window
bind-key ] next-window
bind-key c new-window
bind-key p switch-client -l

# ########## SESSION MANAGEMENT ##########

bind-key -n C-f display-popup -E -w 60% -h 30% "$SCRIPTS/tmux/tmux-sessionizer.sh"
bind-key n run-shell "tmux new-session -A -d -s \"$(basename #{pane_current_path})\" -c #{pane_current_path} && tmux switch-client -t \"$(basename #{pane_current_path})\""
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore "off"        # auto-restore on start
set -g @continuum-save-interval "5"   # min

# ########## STATUS BAR ##########

set-option -g allow-rename off
set-option -g status-position top
set -g status 2
set -g status-format[1] "#{repeat_space 999}"  # Big enough to fill any width
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 1  # 1 or 0
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_pane_id_style hide

# ########## FUZZ BACK ##########

set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind /
set -g @fuzzback-popup 1

set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

