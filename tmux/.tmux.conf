unbind-key -a
unbind r
bind-key r source-file ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-s

set -g mouse on
set -g base-index 1


set-window-option -g mode-keys vi
bind-key -r f run-shell "tmux display-popup -E -w 60% -h 30% ~/.local/scripts/tmux-sessionizer"
# bind-key f run-shell ~/.local/scripts/tmux-sessionizer
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key w kill-pane
bind-key W kill-window
bind-key q detach-client
bind-key d split-window -h
bind-key D split-window -v
bind-key a copy-mode

bind-key [ previous-window
bind-key ] next-window

bind-key c new-window
set -g renumber-windows on

set-option -g allow-rename off
set-option -g status-position top

set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_transparent 1  # 1 or 0
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_git 0
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @tokyo-night-tmux_pane_id_style hide

# Make the status bar 2 lines tall
set -g status 2

# Leave your theme's first line untouched
# (status-format[0] is your theme’s top row)

# Second line (padding)
set -g status-format[1] "#{repeat_space 999}"  # Big enough to fill any width
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

