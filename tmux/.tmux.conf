unbind r
bind r source-file ~/.tmux.conf

unbind d
unbind q
bind-key q detach 

set -g prefix C-s
unbind C-h
unbind C-l
unbind C-a
# Or bind them to 'send-prefix' to pass through
bind-key -n C-h send-keys C-h
bind-key -n C-l send-keys C-l
bind-key -n C-a send-keys C-a
set -g mode-keys vi
set -g mouse on
set -g base-index 1
set-option -g focus-events on
set-option -g default-command "reattach-to-user-namespace -l zsh"
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -r p run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"
bind-key d previous-window
bind-key f next-window

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
unbind c
bind-key c new-window -c "#{pane_current_path}"
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'
set -g @plugin 'fabiolc87/tmux-cwd'
set -g @dracula-plugins "battery time"
set -g @dracula-show-powerline true
set -g @dracula-show-timezone false
set -g status-position top

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
